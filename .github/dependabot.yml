version: 2

updates:
  - package-ecosystem: "maven"
    directories:
      - "**/*"
    target-branch: "main"
    schedule:
      interval: "daily"
      time: "05:00"
      timezone: "Europe/Rome"
    open-pull-requests-limit: 20
    labels:
      - "dependencies"
      - "java"
      - "dependabot"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    pull-request-branch-name:
      separator: "-"

  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "daily"
      time: "05:15"
      timezone: "Europe/Rome"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
      - "dependabot"
    commit-message:
      prefix: "chore(ci)"
    pull-request-branch-name:
      separator: "-"
